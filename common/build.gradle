 architectury {
    common("fabric", "forge")
}

dependencies {
    // Architectury API（作为 mod 依赖以启用 Loom 重映射）
    modImplementation("dev.architectury:architectury:9.2.14")
    compileOnly("net.fabricmc:fabric-loader:${project.loader_version}")
    
    // JLayer - MP3 解码器（舞台模式音频播放）
    implementation("javazoom:jlayer:1.0.1")
    
    // mc-vr-api - Vivecraft VR API（软依赖，运行时可选，modCompileOnly 触发 Loom 重映射）
    modCompileOnly("maven.modrinth:mc-vr-api:${project.mc_vr_api_version}-fabric,1.20.1")
}
 
sourceSets {
    main {
        // 无特殊排除设置
    }
}
